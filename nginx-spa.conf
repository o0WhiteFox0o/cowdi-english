# ============================================
#  Cấu hình Nginx cho Cowdi English - aaPanel
#  (HTTPS redirect + gzip + cache + PWA + SPA)
#  Cập nhật: 27/04/2026 — Fix web không chạy
# ============================================
#
# CÁCH ÁP DỤNG TRÊN AAPANEL:
#   Website → chọn site cowdi.net → Configuration (Nginx)
#   Thay TOÀN BỘ nội dung bằng PHẦN KHÔNG CÓ DẤU # bên dưới
#   (từ dòng "server {" trở xuống)
#
# ═══════════════════════════════════════════
# DANH SÁCH LỖI ĐÃ SỬA (so với config cũ):
# ═══════════════════════════════════════════
# [LỖI 1] location / có cả try_files lẫn return 301
#         → redirect loop vô tận, web trắng hoàn toàn
#         → FIX: xoá return 301 (if $server_port đã lo redirect HTTP)
#
# [LỖI 2] Block "server { listen 443; server_name cowdi.net }" thứ 3
#         trùng với block đầu tiên cũng nghe 443 cowdi.net
#         → Nginx conflict, không biết block nào xử lý
#         → FIX: xoá block thứ 3, giữ 1 block duy nhất
#
# [LỖI 3] location /auth/ và /api/ có trailing slash "/"
#         → proxy_pass bị strip path, OAuth callback sai URL
#         → FIX: đổi thành /auth và /api (không có /)
#
# [LỖI 4] location sw.js và manifest.webmanifest đặt SAU location /
#         → Nginx đã match / trước, không bao giờ vào được
#         → FIX: chuyển lên trước location /
#
# [CẢNH BÁO] location ~ .*\.(js|css)?$ cache 12h
#         → regex location ưu tiên hơn prefix /assets/
#         → ghi đè cache 1y của hashed assets
#         → FIX: xoá block này
# ═══════════════════════════════════════════
