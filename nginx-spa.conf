# ============================================
#  Cấu hình Nginx cho Cowdi English - aaPanel
#  (Tối ưu tốc độ: gzip + cache + WebP)
# ============================================
#
# Trên aaPanel → Website → chọn site → Configuration (Nginx)
# Thêm đoạn sau VÀO TRONG server { ... } block:
#
# ── 0. Gzip nén tất cả text-based assets ────────────────────
#
#   gzip on;
#   gzip_vary on;
#   gzip_proxied any;
#   gzip_comp_level 6;
#   gzip_min_length 256;
#   gzip_types
#       text/plain text/css text/javascript
#       application/json application/javascript application/xml
#       image/svg+xml font/woff2;
#
# ── 1. Static assets: cache dài hạn (JS/CSS/images có hash) ─
#
#   location /assets/ {
#       expires 1y;
#       add_header Cache-Control "public, immutable";
#       access_log off;
#   }
#
# ── 2. WebP images: cache 30 ngày ───────────────────────────
#
#   location ~* \.webp$ {
#       expires 30d;
#       add_header Cache-Control "public";
#       access_log off;
#   }
#
# ── 3. Reverse proxy: /auth và /api đến Node.js backend ─────
#
#   location /auth {
#       proxy_pass http://127.0.0.1:3001;
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#   }
#
#   location /api {
#       client_max_body_size 5m;
#       proxy_pass http://127.0.0.1:3001;
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#   }
#
#   location /health {
#       proxy_pass http://127.0.0.1:3001;
#   }
#
# ── 4. SPA fallback: tất cả route khác trả về index.html ────
#
#   location / {
#       try_files $uri $uri/ /index.html;
#   }
#
# Sau khi thêm xong → nhấn Save → Restart Nginx
